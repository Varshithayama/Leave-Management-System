name: Build & Deploy Leave Management System

on:
  push:
    branches: [ main ]

jobs:
  backend:
    name: Backend - Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore leavemgmt/backend/LeaveManagement.API/LeaveManagement.API.csproj

    - name: Build
      run: dotnet build leavemgmt/backend/LeaveManagement.API/LeaveManagement.API.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish leavemgmt/backend/LeaveManagement.API/LeaveManagement.API.csproj --configuration Release --output ./publish

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'leavemgmt-api'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: ./publish

  frontend:
    name: Frontend - Build & Deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install
      run: npm ci
      working-directory: leavemgmt/frontend

    - name: Build
      run: npm run build
      working-directory: leavemgmt/frontend

    - name: Deploy to Netlify
      uses: netlify/actions/cli@master
      with:
        args: deploy --prod --dir=leavemgmt/frontend/dist/leave-management
      env:
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
name: Build and Deploy Backend to Azure

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore leavemgmt/backend/LeaveManagement.API/LeaveManagement.API.csproj

    - name: Build
      run: dotnet build leavemgmt/backend/LeaveManagement.API/LeaveManagement.API.csproj --configuration Release --no-restore

    - name: Publish
      run: dotnet publish leavemgmt/backend/LeaveManagement.API/LeaveManagement.API.csproj --configuration Release --output ./publish

    - name: Deploy to Azure
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'leavemgmt-api'
        publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
        package: ./publish
